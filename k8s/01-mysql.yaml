apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: smartlogix
type: Opaque
stringData:
  MYSQL_DATABASE: smartlogix
  MYSQL_USER: smartlogix
  MYSQL_PASSWORD: smartlogix123
  MYSQL_ROOT_PASSWORD: root123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: smartlogix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - "--default-authentication-plugin=mysql_native_password"
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-secret
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: smartlogix
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306