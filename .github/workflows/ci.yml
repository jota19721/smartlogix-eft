name: CI/CD SmartLogix EFT

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-push-ecr:
    name: Build, Test and Push to Amazon ECR
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: smartlogix
          MYSQL_USER: smartlogix
          MYSQL_PASSWORD: smartlogix123
          MYSQL_ROOT_PASSWORD: root123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_ENDPOINT: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: smartlogix
      DB_USERNAME: smartlogix
      DB_PASSWORD: smartlogix123
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front_despacho/package-lock.json

      - name: Build y test backend ventas
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST
        run: mvn -B clean test

      - name: Build y test backend despachos
        working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: mvn -B clean test

      - name: Instalar dependencias frontend
        working-directory: front_despacho
        run: npm ci

      - name: Build frontend
        working-directory: front_despacho
        run: npm run build

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir variables de imagen
        shell: bash
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_ENV

      - name: Build imagen backend ventas
        run: |
          docker build \
            -t $ECR_REGISTRY/smartlogix-backend-ventas:$IMAGE_TAG \
            -t $ECR_REGISTRY/smartlogix-backend-ventas:latest \
            ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Push imagen backend ventas
        run: |
          docker push $ECR_REGISTRY/smartlogix-backend-ventas:$IMAGE_TAG
          docker push $ECR_REGISTRY/smartlogix-backend-ventas:latest

      - name: Build imagen backend despachos
        run: |
          docker build \
            -t $ECR_REGISTRY/smartlogix-backend-despachos:$IMAGE_TAG \
            -t $ECR_REGISTRY/smartlogix-backend-despachos:latest \
            ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push imagen backend despachos
        run: |
          docker push $ECR_REGISTRY/smartlogix-backend-despachos:$IMAGE_TAG
          docker push $ECR_REGISTRY/smartlogix-backend-despachos:latest

      - name: Build imagen frontend
        run: |
          docker build \
            -t $ECR_REGISTRY/smartlogix-frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/smartlogix-frontend:latest \
            ./front_despacho

      - name: Push imagen frontend
        run: |
          docker push $ECR_REGISTRY/smartlogix-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/smartlogix-frontend:latest