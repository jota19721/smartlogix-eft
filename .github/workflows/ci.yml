name: CI SmartLogix EFT

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-docker:
    name: Build, Test and Docker Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: smartlogix
          MYSQL_USER: smartlogix
          MYSQL_PASSWORD: smartlogix123
          MYSQL_ROOT_PASSWORD: root123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_ENDPOINT: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: smartlogix
      DB_USERNAME: smartlogix
      DB_PASSWORD: smartlogix123

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front_despacho/package-lock.json

      - name: Build y test backend ventas
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST
        run: mvn -B clean test

      - name: Build y test backend despachos
        working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: mvn -B clean test

      - name: Instalar dependencias frontend
        working-directory: front_despacho
        run: npm ci

      - name: Build frontend
        working-directory: front_despacho
        run: npm run build

      - name: Construir imagen Docker backend ventas
        run: docker build -t smartlogix-backend-ventas:ci ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Construir imagen Docker backend despachos
        run: docker build -t smartlogix-backend-despachos:ci ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Construir imagen Docker frontend
        run: docker build -t smartlogix-frontend:ci ./front_despacho